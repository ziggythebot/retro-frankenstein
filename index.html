<!DOCTYPE html>
<html>
<head>
    <title>Retro Frankenstein - Bureau Bonanza</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: #000;
            color: #0F0;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            border: 3px solid #0F0;
            padding: 40px;
            background: #001100;
        }
        
        h1 {
            color: #0F0;
            text-align: center;
            font-size: 36px;
            margin: 0 0 20px 0;
            text-shadow: 0 0 10px #0F0;
        }
        
        p {
            font-size: 18px;
            line-height: 1.6;
            margin: 20px 0;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }
        
        a {
            background: #0F0;
            color: #000;
            text-decoration: none;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            border: 2px solid #0F0;
            transition: all 0.3s;
        }
        
        a:hover {
            background: #000;
            color: #0F0;
            box-shadow: 0 0 20px #0F0;
        }
        
        .blink {
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            25%, 75% { opacity: 0; }
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧟 RETRO FRANKENSTEIN 🧟</h1>
        <p>
            Bureau Bonanza transformed into retro web aesthetics.
        </p>
        <p>
            Choose your timeline:
        </p>
        
        <div class="links">
            <a href="/geocities">
                🌈 GEOCITIES VERSION<br>
                <small style="font-weight: normal;">1996 Maximum Chaos</small>
            </a>
            
            <a href="/neopets">
                🥚 NEOPETS VERSION<br>
                <small style="font-weight: normal;">Neopia Guild Aesthetic</small>
            </a>
        </div>
        
        <div class="footer">
            <p class="blink">▲ SELECT YOUR DESTINY ▲</p>
            <p>Original site: bureaubonanza.com</p>
        </div>
    </div>
</body>
</html>
